services:
  - type: web
    name: grades4
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 2 -k gthread --threads 4 -b 0.0.0.0:$PORT app:app
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_PASS
        sync: false
      - key: TRUSTED_PROXIES
        value: 127.0.0.1,::1
